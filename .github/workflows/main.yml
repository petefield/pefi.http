name: Build, Tag, Release and Publish NuGet

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4.4.2
      with:
        versionSpec: '6.x'

    - name: Determine version with GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.4.2

    - name: Set version environment variables
      run: |
        echo "VERSION=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_ENV
        echo "TAG=v${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_ENV

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Pack NuGet packages
      run: dotnet pack --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ env.VERSION }}

    - name: Create and push Git tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git rev-parse "${{ env.TAG }}" >/dev/null 2>&1; then
          echo "Tag ${{ env.TAG }} already exists, skipping tag creation."
        else
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}
        fi

    - name: Create GitHub Release
      uses: actions/github-script@v7
      with:
        script: |
          const tag = process.env.TAG;
          try {
            await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });
            console.log(`Release for ${tag} already exists, skipping.`);
          } catch (e) {
            if (e.status !== 404) throw e;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true,
            });
          }

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push "./nupkgs/*.nupkg" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key "${{ secrets.GITHUB_TOKEN }}"

